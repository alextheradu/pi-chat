# docker-compose.yml — Production deployment
# No nginx container — Nginx Proxy Manager (NPM) handles TLS + proxying.
# NPM proxy host: chat.team1676.org → http://localhost:3014  (WebSocket Support: ON)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pi-chat-app
    restart: unless-stopped
    ports:
      - "3014:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
             node scripts/init-minio.js &&
             node dist/server/index.js"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: pi-chat-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: pichat
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d pichat"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pi-chat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
